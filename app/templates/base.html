<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', filename='baseStyle.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='rebirth.css') }}">
    <title>{% block title %} Rebirth {% endblock %}</title>
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <div class="brand">
                <h1>Rebirth</h1>
                <p class="tagline">Resurrect the web. Replay the past.</p>
            </div>
        </div>

        <nav class="site-nav">
            <div class="container nav-inner">
                <a href="{{ url_for('home') }}">Home</a>
                <a href="{{ url_for('history')}}">Search History</a>
            </div>
        </nav>
    </header>

    <section class="flash-wrap">
        <div class="container">
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                <ul class="flash-list">
                    {% for message in messages %}
                        <li class="flash-item">{{ message }}</li>
                    {% endfor %}
                </ul>
            {% endif %}
        {% endwith %}
        </div>
    </section>

    <main class="container page">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
        <hr>
        <p>Rebirth</p>
        </div>
    </footer>
</body>

</html>
